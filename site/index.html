<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyprExpo - Workspace Overview for Hyprland</title>
    <meta
      name="description"
      content="HyprExpo is a maintained expose-style workspace overview plugin for Hyprland."
    />
    <meta name="theme-color" content="#0b0d10" />
    <meta property="og:title" content="HyprExpo" />
    <meta
      property="og:description"
      content="A maintained expose-style workspace overview plugin for Hyprland."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="./hyprexpo-mark.svg" />
  </head>
  <body>
    <main class="page-shell" aria-labelledby="page-title">
      <video
        class="hero-video"
        src="https://github.com/user-attachments/assets/861baa26-46b6-4fa8-8d37-65cbb9ecbed4"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
      ></video>
      <div class="hero-shade" aria-hidden="true"></div>
      <div class="hero-grid" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section class="intro-panel">
        <h1 id="page-title">HyprExpo</h1>
        <p class="subline">
          A maintained expose-style workspace overview with keyboard selection,
          labels, gaps, borders, multi-monitor placement, and Lua gestures.
        </p>

        <div class="install-box" id="install">
          <div>
            <p class="install-label">Install with hyprpm</p>
            <code>hyprpm add https://github.com/sandwichfarm/hyprexpo</code>
          </div>
          <button
            class="copy-command"
            type="button"
            data-copy="hyprpm add https://github.com/sandwichfarm/hyprexpo"
          >
            Copy
          </button>
        </div>

        <nav class="link-row" aria-label="Project links">
          <a href="https://github.com/sandwichfarm/hyprexpo">GitHub</a>
          <a href="https://www.reddit.com/r/hyprland/comments/1o30dsg/hyprexpoplus_outer_gaps_keyboard_navigation_and/">Reddit</a>
          <a href="./docs/">Docs</a>
        </nav>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
