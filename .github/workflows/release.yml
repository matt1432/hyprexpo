name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            hyprland \
            pango \
            cairo \
            libdrm \
            libinput \
            pixman \
            wayland \
            libxkbcommon \
            lua \
            pkgconf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full history + tags so the build bakes the exact tag
          # version (scripts/version.sh uses `git describe`).
          fetch-depth: 0

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: make check-version TAG="${GITHUB_REF_NAME}"

      - name: Verify parser tests
        run: make test

      - name: Build plugin
        run: make all

      - name: Record build provenance
        run: |
          {
            echo "hyprctl version:"
            hyprctl version || true
            echo
            echo "pkg-config hyprland:"
            pkg-config --modversion hyprland || true
            echo
            echo "pkg-config lua5.4:"
            pkg-config --modversion lua5.4 || true
            echo
            echo "compiler:"
            c++ --version | head -n 1
            echo
            echo "ldd -r hyprexpo.so:"
            ldd -r hyprexpo.so || true
          } | tee release-provenance.txt

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hyprexpo.so
            release-provenance.txt
          generate_release_notes: true
